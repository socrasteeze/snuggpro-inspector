<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SnuggPro Inspector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f5f5f4; color: #1c1c1c; min-height: 100vh; }
  a { color: #1c6ef2; }

  /* Layout */
  .shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
  .sidebar { background: #1a1a1a; color: #d4d4d4; padding: 0; overflow-y: auto; position: sticky; top: 0; height: 100vh; }
  .main { padding: 24px; overflow-y: auto; }

  /* Sidebar */
  .sidebar-header { padding: 16px; border-bottom: 1px solid #2e2e2e; }
  .sidebar-header h1 { font-size: 14px; font-weight: 600; color: #fff; }
  .sidebar-header p { font-size: 11px; color: #888; margin-top: 2px; }
  .program-select { width: 100%; margin-top: 8px; background: #2a2a2a; color: #d4d4d4; border: 1px solid #3a3a3a; border-radius: 5px; padding: 5px 8px; font-size: 11px; cursor: pointer; }
  .program-select:focus { outline: none; border-color: #1c6ef2; }
  .sidebar-section { padding: 8px 0; border-bottom: 1px solid #2e2e2e; }
  .sidebar-section-label { font-size: 10px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 16px 4px; }
  .nav-item { display: block; width: 100%; text-align: left; background: none; border: none; padding: 6px 16px; font-size: 12px; color: #b0b0b0; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-item:hover { background: #2a2a2a; color: #fff; }
  .nav-item.active { background: #1c6ef2; color: #fff; }
  .nav-item .method { font-size: 9px; font-weight: 700; background: #2e2e2e; color: #888; padding: 1px 4px; border-radius: 3px; margin-right: 6px; }
  .nav-item.active .method { background: rgba(255,255,255,0.2); color: #fff; }

  /* Job ID bar */
  .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 10px 14px; flex-wrap: wrap; }
  .topbar label { font-size: 12px; color: #666; white-space: nowrap; }
  .topbar input { border: 1px solid #e5e5e5; border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 300px; }
  .topbar input:focus { outline: none; border-color: #1c6ef2; }
  .topbar .job-hint { font-size: 11px; color: #aaa; white-space: nowrap; }
  .topbar .fetch-btn { background: #1c6ef2; color: #fff; border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .topbar .fetch-btn:hover { background: #1558c0; }
  .topbar .fetch-btn:disabled { background: #a0b8e8; cursor: default; }
  .topbar .endpoint-display { font-size: 12px; color: #888; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
  .badge-ok { background: #e6f4ea; color: #1a7a3a; }
  .badge-err { background: #fde8e8; color: #b91c1c; }
  .badge-loading { background: #e8f0fe; color: #1c6ef2; }

  /* Result area */
  .result-wrap { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
  .result-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #f0f0f0; background: #fafafa; }
  .result-toolbar h2 { font-size: 13px; font-weight: 600; flex: 1; }
  .tool-btn { font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; color: #444; }
  .tool-btn:hover { background: #f5f5f5; }
  .tool-btn.active { background: #1c6ef2; color: #fff; border-color: #1c6ef2; }

  /* Views */
  #friendly-view { padding: 16px; }
  #raw-view { display: none; padding: 0; }
  #raw-view pre { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; line-height: 1.6; padding: 16px; white-space: pre-wrap; word-break: break-all; max-height: 70vh; overflow-y: auto; color: #1c1c1c; }

  /* Field cards */
  .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .field-card { background: #f8f8f8; border: 1px solid #ebebeb; border-radius: 6px; padding: 8px 10px; }
  .field-key { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .field-val { font-size: 13px; font-weight: 500; word-break: break-word; }
  .field-val.null-val { color: #bbb; font-weight: 400; }
  .section-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin: 14px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #f0f0f0; }
  .array-item { background: #f8f8f8; border: 1px solid #ebebeb; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
  .array-item-header { font-size: 11px; color: #888; margin-bottom: 8px; }
  .empty-state { color: #aaa; font-size: 13px; text-align: center; padding: 40px; }
  .err-block { background: #fde8e8; border: 1px solid #fbc8c8; border-radius: 6px; padding: 12px 14px; color: #b91c1c; font-size: 13px; margin: 16px; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 14px 0; }

  /* Measures table */
  .measures-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #f0f0f0; background: #fafafa; flex-wrap: wrap; }
  .measures-toolbar .spacer { flex: 1; }
  .measures-toolbar .summary { font-size: 12px; color: #666; }
  .csv-btn { background: #1a7a3a; color: #fff; border: none; border-radius: 5px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
  .csv-btn:hover { background: #156430; }
  .table-scroll { overflow-x: auto; max-height: 72vh; }
  table.measures { border-collapse: collapse; width: 100%; font-size: 12px; }
  table.measures th, table.measures td { padding: 7px 10px; text-align: left; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
  table.measures th { background: #f5f5f4; position: sticky; top: 0; font-weight: 600; cursor: pointer; user-select: none; z-index: 1; }
  table.measures th:hover { background: #ebebea; }
  table.measures th .arrow { color: #1c6ef2; margin-left: 3px; font-size: 10px; }
  table.measures td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.measures tr:hover td { background: #f8fbff; }
  table.measures .measure-cell { font-weight: 500; }
  table.measures .src-rec { color: #1558c0; font-size: 10px; font-weight: 600; }
  table.measures .src-di { color: #8a4b00; font-size: 10px; font-weight: 600; }
  table.measures .neg { color: #b91c1c; }
  table.measures td.copyable { cursor: pointer; }
  table.measures td.copyable:hover { background: #eef4ff; outline: 1px solid #cdddf5; }
  table.measures td.copied { background: #d6f0dd !important; outline: 1px solid #8fcea4; }
  /* Calculated columns — tinted header to visually separate from Deemed group */
  table.measures th.col-calc { background: #f0f4e8; }
  table.measures th.col-calc:hover { background: #e4ebda; }
  table.measures td.col-calc { background: #f8faf3; }
  table.measures tr:hover td.col-calc { background: #edf2e0; }
  table.measures th.col-fw { background: #eef3fb; }
  table.measures th.col-fw:hover { background: #dce8f7; }
  table.measures td.col-fw { background: #f5f8fd; }
  table.measures tr:hover td.col-fw { background: #e8f0fa; }
  /* Collapsible saved/deemed columns */
  table.measures.hide-saved-deemed th.col-saved,
  table.measures.hide-saved-deemed td.col-saved,
  table.measures.hide-saved-deemed th.col-deemed,
  table.measures.hide-saved-deemed td.col-deemed { display: none; }

  /* Combined summary */
  .combined-summary { padding: 14px; border-bottom: 1px solid #f0f0f0; background: #fcfcfb; }
  .csum-basis { font-size: 12px; padding: 6px 10px; border-radius: 5px; margin-bottom: 10px; display: inline-block; }
  .csum-basis.basis-saved { background: #e6f4ea; color: #156430; }
  .csum-basis.basis-deemed { background: #e8f0fe; color: #1558c0; }
  .csum-basis.basis-warn { background: #fdecec; color: #b91c1c; }
  .csum-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .csum-card { flex: 1; min-width: 140px; background: #fff; border: 1px solid #ebebeb; border-radius: 8px; padding: 10px 14px; }
  .csum-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .csum-val { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .csum-unit { font-size: 12px; font-weight: 400; color: #999; margin-left: 4px; }
  .csum-breakdown { font-size: 11px; color: #888; margin-top: 8px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<!-- SIDEBAR -->

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <label>Job ID(s)</label>
    <input type="text" id="jobId" value="332046" placeholder="e.g. 332046, 355981" />
    <span class="job-hint">comma or space separated</span>
    <button class="fetch-btn" id="fetchBtn" onclick="doFetch()">Fetch</button>
    <span class="endpoint-display" id="endpointDisplay">/jobs/{jobId}</span>
    <span class="status-badge" id="statusBadge" style="display:none"></span>
  </div>

  <div class="result-wrap" id="resultWrap" style="display:none">
    <div class="result-toolbar">
      <h2 id="resultTitle"></h2>
      <button class="tool-btn active" id="btnFriendly" onclick="setView('friendly')">Fields</button>
      <button class="tool-btn" id="btnRaw" onclick="setView('raw')">Raw JSON</button>
      <button class="tool-btn" id="btnCopy" onclick="copyJson()">Copy</button>
    </div>
    <div id="friendly-view"></div>
    <div id="raw-view"><pre id="rawPre"></pre></div>
  </div>
</main>

</div>
<script>
let currentPath = '/jobs/{jobId}';
let lastData = null;
let currentView = 'friendly';
let selectedProgram = 'region1';

function onProgramChange(val) {
  selectedProgram = val;
}

// Relative URLs — no port detection needed; worker serves everything on same origin.
function proxyUrl(apiPath) {
  return `/proxy${apiPath}?program=${selectedProgram}`;
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPath = btn.dataset.path;
    document.getElementById('endpointDisplay').textContent = currentPath;
    // Auto-fetch on tab change when a Job ID is already entered (skip the nag otherwise).
    if (parseJobIds(document.getElementById('jobId').value).length > 0) doFetch();
  });
});

function resolvedPath() {
  const jobId = parseJobIds(document.getElementById('jobId').value)[0] || '';
  return currentPath.replace('{jobId}', jobId);
}

async function doFetch() {
  const jobId = parseJobIds(document.getElementById('jobId').value)[0] || '';

  // Special reporting view
  if (currentPath === 'MEASURES') {
    return fetchMeasures(document.getElementById('jobId').value);
  }
  if (currentPath === 'USAGE') {
    return fetchUsageBilling(document.getElementById('jobId').value);
  }

  if (!jobId && currentPath.includes('{jobId}')) {
    alert('Enter a Job ID.');
    return;
  }

  const path = resolvedPath();
  const url = proxyUrl(path);
  const label = document.querySelector('.nav-item.active')?.dataset.label || path;

  setBadge('loading', 'Fetching…');
  document.getElementById('resultWrap').style.display = 'block';
  document.getElementById('resultTitle').textContent = label;
  document.getElementById('friendly-view').innerHTML = '';
  document.getElementById('rawPre').textContent = '';
  document.getElementById('endpointDisplay').textContent = path;
  setView('friendly');

  try {
    const res = await fetch(url);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch(_) { data = text; }
    lastData = data;

    if (!res.ok) {
      setBadge('err', `${res.status} ${res.statusText}`);
      document.getElementById('friendly-view').innerHTML = `<div class="err-block">${res.status} — ${typeof data === 'string' ? data : JSON.stringify(data)}</div>`;
      document.getElementById('rawPre').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      return;
    }

    setBadge('ok', `${res.status} OK`);
    document.getElementById('rawPre').textContent = JSON.stringify(data, null, 2);
    renderFriendly(data);
  } catch(e) {
    setBadge('err', 'Network error');
    document.getElementById('friendly-view').innerHTML = `<div class="err-block">Request failed: ${e.message}</div>`;
  }
}

// ---------- MEASURES REPORTING VIEW ----------
let measureRows = [];
let sortKey = null;
let sortDir = 1;
let currentTier = null; // 'deep' | 'plus' | 'review' | null
let savedDeemedCollapsed = false;

const MEASURE_COLS = [
  { key: 'jobId',            label: 'Job',                num: false },
  { key: 'measure',          label: 'Measure',            num: false },
  { key: 'source',           label: 'Src',                num: false },
  { key: 'name',             label: 'Line Item',          num: false },
  { key: 'code',             label: 'Code',               num: false },
  { key: 'quantity',         label: 'Qty',                num: true  },
  { key: 'unit',             label: 'Unit',               num: false },
  { key: 'costPerUnit',      label: 'Cost/Unit',          num: true  },
  { key: 'lineCost',         label: 'Line Cost',          num: true  },
  { key: 'yrSavings',        label: 'Yr. Savings',        num: true,  group: 'fw', farmworker: true },
  { key: 'lifetimeSavings',  label: 'Savings',            num: true,  group: 'fw', farmworker: true },
  { key: 'sir',              label: 'SIR',                num: true,  group: 'fw', farmworker: true },
  { key: 'savedKwh',         label: 'Saved kWh',          num: true,  group: 'saved'  },
  { key: 'savedTherms',      label: 'Saved Therms',       num: true,  group: 'saved'  },
  { key: 'savedMmbtu',       label: 'Saved MMBTU',        num: true,  group: 'saved'  },
  { key: 'deemedKwh',        label: 'Deemed kWh',         num: true,  group: 'deemed' },
  { key: 'deemedTherms',     label: 'Deemed Therms',      num: true,  group: 'deemed' },
  { key: 'deemedMmbtu',      label: 'Deemed MMBTU',       num: true,  group: 'deemed' },
  { key: 'calcKwh',          label: 'Calculated kWh',     num: true  },
  { key: 'calcTherms',       label: 'Calculated Therms',  num: true  },
  { key: 'calcMmbtu',        label: 'Calculated MMBTU',   num: true  }
];

function activeMeasureCols() {
  return isFarmworkerProgram() ? MEASURE_COLS : MEASURE_COLS.filter(c => !c.farmworker);
}

function num(v) { if (v === null || v === undefined || v === '') return null; const n = Number(v); return isNaN(n) ? null : n; }

const STAGE_LABELS = {
  1:'Lead', 2:'Audit', 3:'Bid Proposed', 4:'Bid Approved',
  5:'Retrofit In Progress', 6:'Retrofit Complete', 7:'QA',
  8:'Uncategorized', 9:'Archived Won', 10:'Archived Lost'
};

function isFarmworkerProgram() {
  return selectedProgram === 'region1' || selectedProgram === 'region2';
}

// Map a job's HVAC systems to a reporting code:
//   rDXHP  = Heat Pump
//   rDXGF  = Central AC with Gas Furnace
//   rNCEH  = No CAC, Electric Resistance Heating
//   rNCGF  = No CAC, Gas Furnace
//   rWTD   = Weighted (multiple distinct heating types)
function classifyHvac(data) {
  const hvacs = Array.isArray(data?.hvacs) ? data.hvacs : [];
  if (!hvacs.length) return '';

  let hasHP = false, hasCentralAC = false, hasGasHeat = false, hasElecHeat = false;
  for (const h of hvacs) {
    const eq   = (h.hvacSystemEquipmentType || '').toLowerCase();
    const fuel = h.hvacHeatingEnergySource  || '';
    const isGas = fuel === 'Natural Gas' || fuel === 'Propane';

    if (eq.includes('heat pump'))                                           hasHP        = true;
    if (eq.includes('central ac') || eq.includes('furnace / central ac'))  hasCentralAC = true;
    if ((eq.includes('furnace') || eq.includes('boiler')) && isGas)        hasGasHeat   = true;
    if (eq === 'electric resistance')                                       hasElecHeat  = true;
  }

  if ([hasHP, hasGasHeat, hasElecHeat].filter(Boolean).length > 1) return 'rWTD';
  if (hasHP)                               return 'rDXHP';
  if (hasCentralAC && hasGasHeat)          return 'rDXGF';
  if (!hasCentralAC && hasElecHeat)        return 'rNCEH';
  if (!hasCentralAC && hasGasHeat)         return 'rNCGF';
  return '';
}

// Derive savings % and program tier from rebatesIncentives metadata on lastData.
// Returns { pct, tier, tierLabel, basisLabel, basisClass }
function getReportingContext() {
  let pct = null;
  try {
    const ri = (lastData.rebatesIncentives || []).find(x => x.code === 'deemedAndModeledKwhSavings');
    if (ri && ri.metadataJSON) {
      const meta = JSON.parse(ri.metadataJSON);
      const row = meta.find(m => m.key === 'combinedTotalEnergySavings');
      if (row) pct = Number(row.value);
    }
  } catch(_) {}

  let tier, tierLabel, basisLabel, basisClass;
  if (pct == null) {
    tier = 'review'; tierLabel = 'Unknown';
    basisLabel = 'Unknown — no savings % available'; basisClass = 'basis-warn';
  } else if (pct > 15) {
    tier = 'deep'; tierLabel = 'Deep';
    basisLabel = `Modeled (saved) · ${pct.toFixed(1)}% savings`; basisClass = 'basis-saved';
  } else if (pct >= 5) {
    tier = 'plus'; tierLabel = 'Pilot Plus';
    basisLabel = `Deemed · ${pct.toFixed(1)}% savings`; basisClass = 'basis-deemed';
  } else {
    tier = 'review'; tierLabel = 'Review';
    basisLabel = `Below 5% (${pct.toFixed(1)}%) — review`; basisClass = 'basis-warn';
  }
  return { pct, tier, tierLabel, basisLabel, basisClass };
}

// Compute per-row Calculated value (kWh/Therms/MMBTU) by tier:
//   deep  → saved preferred, deemed fallback  (modeled savings + deemed where no modeled)
//   plus  → deemed preferred, saved fallback  (deemed savings + saved where no deemed)
//   review → deemed-priority default (keeps totals visible even when tier is uncertain)
function calcRowEnergy(savedVal, deemedVal, tier) {
  if (tier === 'deep') return savedVal != null ? savedVal : deemedVal;
  // plus or review: deemed-priority
  return deemedVal != null ? deemedVal : savedVal;
}

// Stamp calcKwh / calcTherms / calcMmbtu onto every row in measureRows.
// Call this after measureRows is populated and currentTier is set.
function stampCalcColumns() {
  measureRows.forEach(r => {
    r.calcKwh    = calcRowEnergy(r.savedKwh,    r.deemedKwh,    currentTier);
    r.calcTherms = calcRowEnergy(r.savedTherms,  r.deemedTherms, currentTier);
    r.calcMmbtu  = calcRowEnergy(r.savedMmbtu,   r.deemedMmbtu,  currentTier);
  });
}

function flattenMeasures(data) {
  const rows = [];

  // Recommendations → only active/selected (status "1"); one row per detailedCost line item
  (data.recommendations || []).filter(rec => rec.status == '1').forEach(rec => {
    const recSir      = num(rec.sir);
    const recCost     = num(rec.cost);
    const recSavings  = num(rec.savings);
    const base = {
      measure: rec.title,
      savedKwh: num(rec.savedKwh),
      savedTherms: num(rec.savedTherms),
      savedMmbtu: num(rec.savedMbtu),
      deemedKwh: null, deemedTherms: null, deemedMmbtu: null,
      yrSavings:       recSavings,
      lifetimeSavings: (recSir != null && recCost != null) ? +(recSir * recCost).toFixed(2) : null,
      sir:             recSir
    };
    const costs = rec.detailedCosts || [];
    if (costs.length === 0) {
      // measure with no line items but real savings/cost → keep as a single row
      const c = num(rec.cost);
      const hasValue = c || base.savedKwh || base.savedTherms;
      if (hasValue) rows.push({ ...base, source: 'rec', name: rec.title, code: rec.measureCode || '', quantity: null, unit: '', costPerUnit: null, lineCost: c });
    } else {
      costs.forEach(li => {
        const qty = num(li.quantity);
        const cpu = num(li.costPerUnit);
        rows.push({
          ...base,
          source: 'rec',
          name: li.name || '',
          code: li.code || '',
          quantity: qty,
          unit: li.unit || '',
          costPerUnit: cpu,
          lineCost: (qty != null && cpu != null) ? +(qty * cpu).toFixed(2) : num(rec.cost)
        });
      });
    }
  });

  // Direct installs → one row per line item; deemed savings are PER UNIT, so multiply by quantity
  (data.directInstalls || []).forEach(di => {
    (di.lineItems || []).forEach(li => {
      const qty = num(li.quantity);
      const cpu = num(li.costPerUnit);
      const labor = num(li.laborCostPerUnit) || 0;
      const q = qty == null ? 1 : qty;
      const dk = num(li.deemedAnnualKwhSavings);
      const dt = num(li.deemedThermsSavings);
      const dm = num(li.deemedMmbtuSavings);
      rows.push({
        measure: 'Direct Install',
        source: 'DI',
        name: li.name ? li.name.trim() : '',
        code: li.code || '',
        quantity: qty,
        unit: li.unit || '',
        costPerUnit: cpu,
        lineCost: (qty != null && cpu != null) ? +(qty * (cpu + labor)).toFixed(2) : null,
        savedKwh: null, savedTherms: null, savedMmbtu: null,
        deemedKwh: dk == null ? null : +(dk * q).toFixed(4),
        deemedTherms: dt == null ? null : +(dt * q).toFixed(4),
        deemedMmbtu: dm == null ? null : +(dm * q).toFixed(6)
      });
    });
  });

  return rows;
}

function parseJobIds(raw) {
  return raw.split(/[\s,]+/).map(s => s.trim()).filter(Boolean);
}

async function fetchMeasures(rawIds) {
  const jobIds = parseJobIds(rawIds);
  if (jobIds.length === 0) { alert('Enter at least one Job ID.'); return; }

  const multi = jobIds.length > 1;
  setBadge('loading', multi ? `Fetching ${jobIds.length} jobs…` : 'Fetching…');
  document.getElementById('resultWrap').style.display = 'block';
  document.getElementById('resultTitle').textContent = 'Measures Table';
  document.getElementById('friendly-view').innerHTML = `<div style="padding:20px;color:#888">Loading ${multi ? jobIds.join(', ') : jobIds[0]}…</div>`;
  document.getElementById('rawPre').textContent = '';
  document.getElementById('endpointDisplay').textContent = multi ? `${jobIds.length} jobs` : `/jobs/${jobIds[0]}/all-data`;
  setView('friendly');

  const errors = [];
  const allRows = [];
  let combinedData = null; // lastData = last successful job's data (for summary pct)

  for (const jobId of jobIds) {
    const url = proxyUrl(`/jobs/${jobId}/all-data`);
    try {
      const res = await fetch(url);
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch(_) { data = null; }
      if (!res.ok || !data) {
        errors.push(`Job ${jobId}: ${res.status} ${res.statusText}`);
        continue;
      }
      combinedData = data;
      // Derive tier per-job so multi-job rows are stamped independently
      lastData = data;
      const jobTier = getReportingContext().tier;
      const rows = flattenMeasures(data);
      rows.forEach(r => {
        r.jobId = jobId;
        r.calcKwh    = calcRowEnergy(r.savedKwh,   r.deemedKwh,    jobTier);
        r.calcTherms = calcRowEnergy(r.savedTherms, r.deemedTherms, jobTier);
        r.calcMmbtu  = calcRowEnergy(r.savedMmbtu,  r.deemedMmbtu,  jobTier);
      });
      allRows.push(...rows);
    } catch(e) {
      errors.push(`Job ${jobId}: network error`);
    }
  }

  if (allRows.length === 0) {
    setBadge('err', 'No data');
    document.getElementById('friendly-view').innerHTML =
      `<div class="err-block">${errors.join('<br/>') || 'No data returned. Check the Job ID and selected program.'}</div>`;
    return;
  }

  lastData = combinedData;
  document.getElementById('rawPre').textContent = JSON.stringify(combinedData, null, 2);
  measureRows = allRows;
  // currentTier is only used by buildCombinedSummary for the single-job basis badge;
  // for multi-job it reflects the last job fetched (used for display only, not row stamping)
  currentTier = getReportingContext().tier;
  // stampCalcColumns() already done per-job above; skip it here
  sortKey = null;
  const errNote = errors.length ? ` · ${errors.length} failed` : '';
  setBadge(errors.length ? 'err' : 'ok', `${measureRows.length} line items${errNote}`);
  renderMeasures();
}

function buildCombinedSummary() {
  const s = { savedKwh:0, savedTherms:0, savedMmbtu:0, deemedKwh:0, deemedTherms:0, deemedMmbtu:0 };
  measureRows.forEach(r => Object.keys(s).forEach(k => { if (typeof r[k] === 'number') s[k] += r[k]; }));

  const combinedKwh = s.savedKwh + s.deemedKwh;
  const combinedTherms = s.savedTherms + s.deemedTherms;
  const combinedMmbtu = s.savedMmbtu + s.deemedMmbtu;

  const jobIds = [...new Set(measureRows.map(r => r.jobId).filter(Boolean))];
  const multi = jobIds.length > 1;

  const card = (label, val, unit) =>
    `<div class="csum-card"><div class="csum-label">${label}</div><div class="csum-val">${val.toFixed(2)}<span class="csum-unit">${unit}</span></div></div>`;

  let h = '<div class="combined-summary">';

  if (!multi) {
    const stageId = lastData?.job?.stageId ?? lastData?.stageId;
    const stageLabel = stageId != null ? (STAGE_LABELS[stageId] ?? `Stage ${stageId}`) : null;
    const farmworker = isFarmworkerProgram();
    const { tier, tierLabel, basisLabel, basisClass } = getReportingContext();
    const tierBadgeClass = tier === 'deep' ? 'basis-saved' : tier === 'plus' ? 'basis-deemed' : 'basis-warn';

    h += `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">`;
    if (stageLabel) h += `<div class="csum-basis" style="margin-bottom:0;background:#f0f0f0;color:#444">Stage: <strong>${stageLabel}</strong></div>`;
    if (!farmworker) {
      h += `<div class="csum-basis ${basisClass}" style="margin-bottom:0">Reporting basis: <strong>${basisLabel}</strong></div>`;
      h += `<div class="csum-basis ${tierBadgeClass}" style="margin-bottom:0">Customer tier: <strong>${tierLabel}</strong></div>`;
    }
    h += `</div>`;
  }

  h += '<div class="csum-grid">';
  h += card('Combined kWh', combinedKwh, 'kWh');
  h += card('Combined Therms', combinedTherms, 'thm');
  h += card('Combined MMBTU', combinedMmbtu, 'MMBTU');
  h += '</div>';
  h += `<div class="csum-breakdown">Modeled ${s.savedKwh.toFixed(2)} kWh / ${s.savedTherms.toFixed(2)} thm &nbsp;·&nbsp; Deemed ${s.deemedKwh.toFixed(2)} kWh / ${s.deemedTherms.toFixed(2)} thm</div>`;
  h += '</div>';
  return h;
}

function renderMeasures() {
  const rows = [...measureRows];
  if (sortKey) {
    const col = MEASURE_COLS.find(c => c.key === sortKey);
    rows.sort((a, b) => {
      let x = a[sortKey], y = b[sortKey];
      if (col.num) { x = x == null ? -Infinity : x; y = y == null ? -Infinity : y; return (x - y) * sortDir; }
      x = (x || '').toString().toLowerCase(); y = (y || '').toString().toLowerCase();
      return x < y ? -sortDir : x > y ? sortDir : 0;
    });
  }

  // Totals
  const tot = { quantity:0, lineCost:0, yrSavings:0, lifetimeSavings:0, savedKwh:0, savedTherms:0, savedMmbtu:0, deemedKwh:0, deemedTherms:0, deemedMmbtu:0, calcKwh:0, calcTherms:0, calcMmbtu:0 };
  rows.forEach(r => Object.keys(tot).forEach(k => { if (typeof r[k] === 'number') tot[k] += r[k]; }));

  const jobSet = [...new Set(rows.map(r => r.jobId).filter(Boolean))];
  const jobNote = jobSet.length > 1 ? ` · <strong>${jobSet.length}</strong> jobs` : '';
  let html = '<div class="measures-toolbar">';
  html += `<span class="summary"><strong>${rows.length}</strong> line items${jobNote} · <span class="src-rec">REC</span> ${rows.filter(r=>r.source==='rec').length} · <span class="src-di">DI</span> ${rows.filter(r=>r.source==='DI').length}</span>`;
  html += '<div class="spacer"></div>';
  const collapseLabel = savedDeemedCollapsed ? 'Show Saved/Deemed' : 'Hide Saved/Deemed';
  html += `<button class="tool-btn${savedDeemedCollapsed ? ' active' : ''}" onclick="toggleSavedDeemed()">${collapseLabel}</button>`;
  html += '<button class="csv-btn" onclick="exportMeasuresCsv()">Download CSV</button>';
  html += '</div>';

  html += buildCombinedSummary();

  const CALC_KEYS = new Set(['calcKwh', 'calcTherms', 'calcMmbtu']);
  const colGroup = c => CALC_KEYS.has(c.key) ? 'col-calc' : c.group === 'fw' ? 'col-fw' : c.group === 'saved' ? 'col-saved' : c.group === 'deemed' ? 'col-deemed' : '';
  const cols = activeMeasureCols();

  const tableClass = `measures${savedDeemedCollapsed ? ' hide-saved-deemed' : ''}`;
  html += `<div class="table-scroll"><table class="${tableClass}"><thead><tr>`;
  cols.forEach(c => {
    const arrow = sortKey === c.key ? `<span class="arrow">${sortDir === 1 ? '▲' : '▼'}</span>` : '';
    const grpCls = colGroup(c);
    html += `<th${grpCls ? ` class="${grpCls}"` : ''} onclick="sortMeasures('${c.key}')">${c.label}${arrow}</th>`;
  });
  html += '</tr></thead><tbody>';

  rows.forEach(r => {
    html += '<tr>';
    cols.forEach(c => {
      let v = r[c.key];
      const grpCls = colGroup(c);
      if (c.key === 'source') {
        html += `<td${grpCls ? ` class="${grpCls}"` : ''}><span class="${v === 'rec' ? 'src-rec' : 'src-di'}">${v === 'rec' ? 'REC' : 'DI'}</span></td>`;
        return;
      }
      if (c.num) {
        const display = v == null ? '' : (Number.isInteger(v) ? v : v.toFixed(2));
        const neg = (typeof v === 'number' && v < 0) ? ' neg' : '';
        const copyAttr = v == null ? '' : ` data-copy="${v}" onclick="copyCell(this)" title="Click to copy"`;
        const cls = ['num', neg, grpCls, 'copyable'].filter(Boolean).join(' ');
        html += `<td class="${cls}"${copyAttr}>${display}</td>`;
      } else {
        const measureCls = c.key === 'measure' ? 'measure-cell' : '';
        const copyAttr = (v == null || v === '') ? '' : ` data-copy="${String(v).replace(/"/g,'&quot;')}" onclick="copyCell(this)" title="Click to copy"`;
        const copyable = (v != null && v !== '') ? 'copyable' : '';
        const cls = [measureCls, grpCls, copyable].filter(Boolean).join(' ');
        html += `<td${cls ? ` class="${cls}"` : ''}${copyAttr}>${v == null ? '' : v}</td>`;
      }
    });
    html += '</tr>';
  });

  // Totals row (SIR is a ratio — not summed)
  html += '<tr style="border-top:2px solid #ddd;font-weight:600;background:#fafafa">';
  cols.forEach(c => {
    const grpCls = colGroup(c);
    if (c.key === 'measure') { html += '<td class="measure-cell">TOTAL</td>'; return; }
    if (c.key === 'sir') { html += `<td class="${['num', grpCls].filter(Boolean).join(' ')}"></td>`; return; }
    if (c.num && tot[c.key] !== undefined) {
      const v = tot[c.key];
      const display = Number.isInteger(v) ? v : v.toFixed(2);
      const cls = ['num', grpCls].filter(Boolean).join(' ');
      html += `<td class="${cls}">${display}</td>`;
    } else { html += `<td${grpCls ? ` class="${grpCls}"` : ''}></td>`; }
  });
  html += '</tr>';

  html += '</tbody></table></div>';
  document.getElementById('friendly-view').innerHTML = html;
}

function copyCell(el) {
  const val = el.getAttribute('data-copy');
  if (val == null) return;
  navigator.clipboard?.writeText(val);
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 600);
}

function sortMeasures(key) {
  if (sortKey === key) sortDir = -sortDir;
  else { sortKey = key; sortDir = 1; }
  renderMeasures();
}

function toggleSavedDeemed() {
  savedDeemedCollapsed = !savedDeemedCollapsed;
  renderMeasures();
}

// Build a clean, comma/space-free filename token from the Job ID input.
//   1 job  -> job_332046      2-3 jobs -> jobs_332046-355981      4+ -> 5jobs
function jobFileTag() {
  const ids = parseJobIds(document.getElementById('jobId').value).map(s => s.replace(/[^\w.-]/g, ''));
  if (ids.length === 0) return 'export';
  if (ids.length === 1) return `job_${ids[0]}`;
  if (ids.length <= 3) return `jobs_${ids.join('-')}`;
  return `${ids.length}jobs`;
}

function exportMeasuresCsv() {
  const cols = activeMeasureCols();
  const headers = cols.map(c => c.label);
  const lines = [headers.join(',')];
  measureRows.forEach(r => {
    const cells = cols.map(c => {
      let v = r[c.key];
      if (v === null || v === undefined) return '';
      v = String(v);
      if (v.includes(',') || v.includes('"') || v.includes('\n')) v = '"' + v.replace(/"/g, '""') + '"';
      return v;
    });
    lines.push(cells.join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `measures_${jobFileTag()}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

let usageRows = [];

const USAGE_COLS = [
  { key: 'jobId',      label: 'Job',         num: false },
  { key: 'fuel',       label: 'Fuel',        num: false },
  { key: 'startDate',  label: 'Bill Start',  num: false },
  { key: 'endDate',    label: 'Bill End',    num: false },
  { key: 'billedDays', label: 'Billed Days', num: true  },
  { key: 'usage',      label: 'Usage',       num: true  },
  { key: 'units',      label: 'Units',       num: false },
  { key: 'mmbtu',      label: 'MMBTU',       num: true  }
];

// Standard energy-content conversions to MMBTU (1 MMBTU = 1,000,000 BTU).
const KWH_TO_MMBTU = 3412.14 / 1e6; // 1 kWh = 3,412.14 BTU
const THERM_TO_MMBTU = 0.1;         // 1 therm = 100,000 BTU

function daysBetween(a, b) {
  const ms = Date.parse(b) - Date.parse(a);
  return Number.isNaN(ms) ? null : Math.round(ms / 86400000);
}

// Normalize whatever the API returns (ISO date, ISO datetime, or a verbose
// "Mon Jun 23 2026 00:00:00 GMT+0000 (…)" string) to a plain YYYY-MM-DD.
function fmtDate(v) {
  if (!v) return '';
  const s = String(v);
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);   // already starts ISO -> slice, no TZ math
  if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
  const t = Date.parse(s);
  if (Number.isNaN(t)) return s;                      // unparseable -> leave as-is
  const d = new Date(t);
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${m}-${day}`;
}

// Walk the flat, numbered bill series under data.utilities into one row per fuel
// per billing period. Period N spans (prior read date -> end*Date N); usage =
// end*Bill N. Period 1's start is start*Date1; later periods start at the prior
// end date. mmbtu is computed from usage only when units are energy units.
function flattenUsage(data) {
  const u = data && data.utilities;
  if (!u) return [];
  const rows = [];

  function series(fuel, startKey, datePrefix, billPrefix, units, toMmbtu) {
    let prev = u[startKey];
    for (let i = 1; i <= 13; i++) {
      const end = u[datePrefix + i];
      if (!end) break; // series ended
      const usage = num(u[billPrefix + i]);
      const mmbtu = (usage != null && toMmbtu != null) ? +(usage * toMmbtu).toFixed(6) : null;
      rows.push({
        fuel,
        startDate: fmtDate(prev),
        endDate: fmtDate(end),
        billedDays: prev ? daysBetween(prev, end) : null,
        usage,
        units: units || '',
        mmbtu
      });
      prev = end;
    }
  }

  const eUnits = u.electricBillUnits || '';
  series('Electric', 'startElectricDate1', 'endElectricDate', 'endElectricBill',
         eUnits, eUnits === 'kWh' ? KWH_TO_MMBTU : null);

  const fUnits = u.fuelBillUnits || '';
  series('Gas', 'startFuelDate1', 'endFuelDate', 'endFuelBill',
         fUnits, fUnits === 'Therms' ? THERM_TO_MMBTU : null);

  return rows;
}

async function fetchUsageBilling(rawIds) {
  const jobIds = parseJobIds(rawIds);
  if (jobIds.length === 0) { alert('Enter at least one Job ID.'); return; }

  const multi = jobIds.length > 1;
  setBadge('loading', multi ? `Fetching ${jobIds.length} jobs…` : 'Fetching…');
  document.getElementById('resultWrap').style.display = 'block';
  document.getElementById('resultTitle').textContent = 'Usage / Billing';
  document.getElementById('friendly-view').innerHTML = `<div style="padding:20px;color:#888">Loading ${multi ? jobIds.join(', ') : jobIds[0]}…</div>`;
  document.getElementById('rawPre').textContent = '';
  document.getElementById('endpointDisplay').textContent = multi ? `${jobIds.length} jobs` : `/jobs/${jobIds[0]}/all-data`;
  setView('friendly');

  const errors = [];
  const allRows = [];
  let lastUtilities = null;

  for (const jobId of jobIds) {
    const url = proxyUrl(`/jobs/${jobId}/all-data`);
    try {
      const res = await fetch(url);
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch(_) { data = null; }
      if (!res.ok || !data) {
        errors.push(`Job ${jobId}: ${res.status} ${res.statusText}`);
        continue;
      }
      if (data.utilities) lastUtilities = data.utilities;
      const rows = flattenUsage(data);
      rows.forEach(r => { r.jobId = jobId; });
      allRows.push(...rows);
    } catch(e) {
      errors.push(`Job ${jobId}: network error`);
    }
  }

  if (allRows.length === 0) {
    setBadge('err', 'No data');
    document.getElementById('friendly-view').innerHTML =
      `<div class="err-block">${errors.join('<br/>') || 'No periodic utility bills found for this job (it may use Simple/No-Bills entry).'}</div>`;
    return;
  }

  document.getElementById('rawPre').textContent = JSON.stringify(lastUtilities, null, 2);
  usageRows = allRows;
  setBadge('ok', errors.length ? `Loaded · ${errors.length} error(s)` : `${allRows.length} bills`);
  renderUsage();
}

function sortUsage(key) {
  if (sortKey === key) sortDir = -sortDir;
  else { sortKey = key; sortDir = 1; }
  renderUsage();
}

function renderUsage() {
  const rows = [...usageRows];
  if (sortKey) {
    const col = USAGE_COLS.find(c => c.key === sortKey);
    if (col) {
      rows.sort((a, b) => {
        let x = a[sortKey], y = b[sortKey];
        if (col.num) { x = x == null ? -Infinity : x; y = y == null ? -Infinity : y; return (x - y) * sortDir; }
        x = (x || '').toString().toLowerCase(); y = (y || '').toString().toLowerCase();
        return x < y ? -sortDir : x > y ? sortDir : 0;
      });
    }
  }

  // Totals: billedDays + mmbtu only (usage is mixed-unit across fuels).
  const tot = { billedDays: 0, mmbtu: 0 };
  rows.forEach(r => Object.keys(tot).forEach(k => { if (typeof r[k] === 'number') tot[k] += r[k]; }));

  const jobSet = [...new Set(rows.map(r => r.jobId).filter(Boolean))];
  const jobNote = jobSet.length > 1 ? ` · <strong>${jobSet.length}</strong> jobs` : '';
  const elec = rows.filter(r => r.fuel === 'Electric').length;
  const gas = rows.filter(r => r.fuel === 'Gas').length;

  let html = '<div class="measures-toolbar">';
  html += `<span class="summary"><strong>${rows.length}</strong> bills${jobNote} · Electric ${elec} · Gas ${gas} · usage total omitted (mixed units)</span>`;
  html += '<div class="spacer"></div>';
  html += '<button class="csv-btn" onclick="exportUsageCsv()">Download CSV</button>';
  html += '</div>';

  html += '<div class="table-scroll"><table class="measures"><thead><tr>';
  USAGE_COLS.forEach(c => {
    const arrow = sortKey === c.key ? `<span class="arrow">${sortDir === 1 ? '▲' : '▼'}</span>` : '';
    html += `<th onclick="sortUsage('${c.key}')">${c.label}${arrow}</th>`;
  });
  html += '</tr></thead><tbody>';

  rows.forEach(r => {
    html += '<tr>';
    USAGE_COLS.forEach(c => {
      const v = r[c.key];
      if (c.num) {
        let disp = '';
        if (v != null) disp = c.key === 'billedDays' ? String(v) : c.key === 'mmbtu' ? v.toFixed(4) : (Number.isInteger(v) ? String(v) : v.toFixed(2));
        const copyAttr = v == null ? '' : ` data-copy="${v}" onclick="copyCell(this)" title="Click to copy"`;
        html += `<td class="num"${copyAttr}>${disp}</td>`;
      } else {
        const disp = v == null ? '' : String(v);
        const copyAttr = (v == null || v === '') ? '' : ` data-copy="${String(v).replace(/"/g, '&quot;')}" onclick="copyCell(this)"`;
        html += `<td${copyAttr}>${disp}</td>`;
      }
    });
    html += '</tr>';
  });

  html += '<tr style="border-top:2px solid #ddd;font-weight:600;background:#fafafa">';
  USAGE_COLS.forEach(c => {
    if (c.key === 'jobId') { html += '<td>TOTAL</td>'; return; }
    if (c.key === 'billedDays') { html += `<td class="num">${tot.billedDays}</td>`; return; }
    if (c.key === 'mmbtu') { html += `<td class="num">${tot.mmbtu.toFixed(4)}</td>`; return; }
    html += '<td></td>';
  });
  html += '</tr>';

  html += '</tbody></table></div>';
  document.getElementById('friendly-view').innerHTML = html;
}

function exportUsageCsv() {
  const headers = USAGE_COLS.map(c => c.label);
  const lines = [headers.join(',')];
  usageRows.forEach(r => {
    const cells = USAGE_COLS.map(c => {
      let v = r[c.key];
      if (v === null || v === undefined) return '';
      v = String(v);
      if (v.includes(',') || v.includes('"') || v.includes('\n')) v = '"' + v.replace(/"/g, '""') + '"';
      return v;
    });
    lines.push(cells.join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `usage_${jobFileTag()}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
// ---------- END USAGE / BILLING ----------

function renderFriendly(data) {
  const el = document.getElementById('friendly-view');
  if (data === null || data === undefined) { el.innerHTML = '<div class="empty-state">Empty response</div>'; return; }
  if (typeof data !== 'object') { el.innerHTML = `<div style="padding:16px;font-family:monospace;font-size:13px;">${data}</div>`; return; }

  const arr = Array.isArray(data) ? data : [data];
  if (arr.length === 0) { el.innerHTML = '<div class="empty-state">No records returned</div>'; return; }

  let html = '';
  const priorityKeys = ['id','job_id','uuid','address','city','state','zip','county','status','stage','name','first_name','last_name','full_name','email','phone','created_at','updated_at','service_time','account_id','company_id','program_id'];

  arr.forEach((item, idx) => {
    if (typeof item !== 'object' || !item) { html += `<div class="field-card" style="margin:4px 0"><div class="field-val">${item}</div></div>`; return; }

    if (arr.length > 1) html += `<div class="section-label">Record ${idx + 1}</div>`;

    const allKeys = Object.keys(item);
    const ordered = [...new Set([...priorityKeys.filter(k => k in item), ...allKeys])];
    const flat = ordered.filter(k => { const v = item[k]; return v === null || v === undefined || typeof v !== 'object'; });
    const nested = ordered.filter(k => { const v = item[k]; return v !== null && v !== undefined && typeof v === 'object'; });

    html += '<div class="field-grid">';
    flat.forEach(k => {
      const v = item[k];
      const display = v === null || v === undefined || v === '' ? '—' : String(v);
      const nullClass = (v === null || v === undefined || v === '') ? ' null-val' : '';
      html += `<div class="field-card"><div class="field-key">${k}</div><div class="field-val${nullClass}">${display}</div></div>`;
    });
    html += '</div>';

    nested.forEach(k => {
      const sub = item[k];
      html += `<div class="section-label">${k}</div>`;
      if (Array.isArray(sub)) {
        if (sub.length === 0) { html += '<div style="color:#aaa;font-size:12px;margin-bottom:12px">Empty array</div>'; return; }
        sub.forEach((s, i) => {
          if (typeof s !== 'object' || !s) { html += `<div class="array-item"><div class="field-val">${s}</div></div>`; return; }
          html += `<div class="array-item"><div class="array-item-header">Item ${i + 1}</div><div class="field-grid">`;
          Object.keys(s).forEach(sk => {
            const sv = s[sk];
            const display = sv === null || sv === undefined || sv === '' ? '—' : (typeof sv === 'object' ? JSON.stringify(sv) : String(sv));
            const nullClass = (sv === null || sv === undefined || sv === '') ? ' null-val' : '';
            html += `<div class="field-card"><div class="field-key">${sk}</div><div class="field-val${nullClass}">${display}</div></div>`;
          });
          html += '</div></div>';
        });
      } else {
        html += '<div class="field-grid">';
        Object.keys(sub).forEach(sk => {
          const sv = sub[sk];
          const display = sv === null || sv === undefined || sv === '' ? '—' : (typeof sv === 'object' ? JSON.stringify(sv) : String(sv));
          const nullClass = (sv === null || sv === undefined || sv === '') ? ' null-val' : '';
          html += `<div class="field-card"><div class="field-key">${sk}</div><div class="field-val${nullClass}">${display}</div></div>`;
        });
        html += '</div>';
      }
    });

    if (idx < arr.length - 1) html += '<hr class="divider" />';
  });

  el.innerHTML = html;
}

window.addEventListener('load', () => doFetch());

// ---------- XLSX EXPORT ----------
// Uses JSZip to patch the template ZIP directly, avoiding SheetJS's table round-trip
// limitation (SheetJS CE drops xl/tables/*.xml files on write).

function colIdxToLetter(idx) {
  if (idx < 26) return String.fromCharCode(65 + idx);
  return String.fromCharCode(64 + Math.floor(idx / 26)) + String.fromCharCode(65 + (idx % 26));
}

function xmlEsc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildRowXml(rowNum, values) {
  let xml = `<row r="${rowNum}" spans="1:${values.length}">`;
  values.forEach((val, i) => {
    if (val == null || val === '') return;
    const ref = colIdxToLetter(i) + rowNum;
    if (typeof val === 'number') {
      xml += `<c r="${ref}"><v>${val}</v></c>`;
    } else {
      xml += `<c r="${ref}" t="inlineStr"><is><t>${xmlEsc(val)}</t></is></c>`;
    }
  });
  return xml + '</row>';
}

// Keeps template header row (row 1) as-is; replaces all data rows with new ones.
function patchSheetXml(sheetXml, dataRows, numCols) {
  const headerMatch = sheetXml.match(/<row r="1"[\s\S]*?<\/row>/);
  const headerRow = headerMatch ? headerMatch[0] : '';
  const dataXml = dataRows.map((vals, i) => buildRowXml(i + 2, vals)).join('');
  const newSheetData = `<sheetData>${headerRow}${dataXml}</sheetData>`;
  const lastRow = dataRows.length + 1;
  const lastCol = colIdxToLetter(numCols - 1);
  return sheetXml
    .replace(/<sheetData>[\s\S]*?<\/sheetData>/, newSheetData)
    .replace(/(<dimension ref=")[^"]*(")/,  `$1A1:${lastCol}${lastRow}$2`);
}

// Parse the shared string table from xl/sharedStrings.xml into an index array.
function parseSharedStrings(ssXml) {
  const strings = [];
  const siRe = /<si>([\s\S]*?)<\/si>/g;
  let sm;
  while ((sm = siRe.exec(ssXml)) !== null) {
    const parts = [];
    const tRe = /<t[^>]*>([^<]*)<\/t>/g;
    let tm;
    while ((tm = tRe.exec(sm[1])) !== null) parts.push(tm[1]);
    strings.push(parts.join(''));
  }
  return strings;
}

// Extract the text value of each cell in row 1 of a sheet XML.
// Handles both shared strings (t="s") and inline strings (t="inlineStr").
function extractHeaderNames(sheetXml, sharedStrings) {
  const headerMatch = sheetXml.match(/<row r="1"[\s\S]*?<\/row>/);
  if (!headerMatch) return [];
  const names = [];
  const cellRe = /<c r="[A-Z]+1"([^>]*)>([\s\S]*?)<\/c>/g;
  let cm;
  while ((cm = cellRe.exec(headerMatch[0])) !== null) {
    const typeM = cm[1].match(/\bt="([^"]*)"/);
    const cellType = typeM ? typeM[1] : '';
    const inner = cm[2];
    if (cellType === 's') {
      const vM = inner.match(/<v>(\d+)<\/v>/);
      names.push(vM ? (sharedStrings[+vM[1]] || '') : '');
    } else if (cellType === 'inlineStr') {
      const tM = inner.match(/<t[^>]*>([^<]*)<\/t>/);
      names.push(tM ? tM[1] : '');
    } else {
      const vM = inner.match(/<v>([^<]*)<\/v>/);
      names.push(vM ? vM[1] : '');
    }
  }
  return names;
}

// Updates ref + autoFilter ref and rebuilds <tableColumns> to match the actual headers,
// fixing the mismatch that causes Excel to repair/remove the table.
function patchTableXml(tableXml, newRef, columnNames) {
  let out = tableXml
    .replace(/(<table\b[^>]* ref=")[^"]*(")/,       `$1${newRef}$2`)
    .replace(/(<autoFilter\b[^>]* ref=")[^"]*(")/,  `$1${newRef}$2`);
  if (columnNames && columnNames.length) {
    const colsXml = columnNames.map((n, i) =>
      `<tableColumn id="${i + 1}" name="${xmlEsc(n || ('Column' + (i + 1)))}"/>`
    ).join('');
    out = out.replace(/<tableColumns[\s\S]*?<\/tableColumns>/,
      `<tableColumns count="${columnNames.length}">${colsXml}</tableColumns>`);
  }
  return out;
}

async function exportXlsx() {
  const rawIds = document.getElementById('jobId').value.trim();
  const jobIds = parseJobIds(rawIds);
  if (jobIds.length === 0) { alert('Enter at least one Job ID.'); return; }

  setBadge('loading', 'Building XLSX…');

  let tplBuf;
  try {
    const tplRes = await fetch('/template');
    if (!tplRes.ok) { alert('template.xlsx not found — contact your administrator.'); setBadge('err', 'No template'); return; }
    tplBuf = await tplRes.arrayBuffer();
  } catch(e) { alert('Could not load template.'); setBadge('err', 'Template error'); return; }

  const mainOut = [], measuresOut = [], elecOut = [], gasOut = [], errors = [];

  for (const jobId of jobIds) {
    try {
      const res = await fetch(proxyUrl(`/jobs/${jobId}/all-data`));
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch(_) { data = null; }
      if (!res.ok || !data) { errors.push(`Job ${jobId}: ${res.status}`); continue; }

      lastData = data;
      const { pct, tier } = getReportingContext();
      const jobMeasureRows = flattenMeasures(data);

      // Sheet1: AuditId, Path, Savings %, TypeOfHome, HVAC
      const path = tier === 'deep' ? 'Pilot Deep' : tier === 'plus' ? 'Pilot Plus' : '';
      const typeOfHome = data?.house?.typeOfHome ?? data?.typeOfHome ?? '';
      mainOut.push([jobId, path, pct != null ? +pct.toFixed(2) : '', typeOfHome, classifyHvac(data)]);

      // Column order must match table2.xml: AuditId,Measure,Src,ReportingCode,Code,
      // MeasureQty,Unit,Cost/Unit,MeasureCostOverride,Saved kWh,Saved Therms,Saved MMBTU,
      // Deemed kWh,Deemed Therms,Deemed MMBTU,SavedkWh,SavedTherms,SavedMBTUs
      jobMeasureRows.forEach(r => {
        measuresOut.push([
          jobId, r.measure, r.source, r.name, r.code,
          r.quantity, r.unit, r.costPerUnit, r.lineCost,
          r.savedKwh, r.savedTherms, r.savedMmbtu,
          r.deemedKwh, r.deemedTherms, r.deemedMmbtu,
          calcRowEnergy(r.savedKwh,    r.deemedKwh,    tier),
          calcRowEnergy(r.savedTherms, r.deemedTherms, tier),
          calcRowEnergy(r.savedMmbtu,  r.deemedMmbtu,  tier)
        ]);
      });

      // Column order: table3 = AuditId,Fuel,ElectricBillStartDate,ElectricBillEndDate,Billed Days,ElectricMonthkWhUsage,Units,MMBTU
      // Column order: table4 = AuditId,Fuel,GasBillStartDate,Gas End,GasBilledDays,GasMonthThermsUsage,Units,MMBTU
      flattenUsage(data).forEach(r => {
        if (r.fuel === 'Electric') {
          elecOut.push([jobId, 'Electric', r.startDate, r.endDate, r.billedDays, r.usage, r.units, r.mmbtu]);
        } else if (r.fuel === 'Gas') {
          gasOut.push([jobId, 'Gas', r.startDate, r.endDate, r.billedDays, r.usage, r.units, r.mmbtu]);
        }
      });
    } catch(e) {
      errors.push(`Job ${jobId}: network error`);
    }
  }

  // Open template ZIP and patch sheets + table refs in-place
  const zip = await JSZip.loadAsync(tplBuf);

  // Load shared strings once; needed to resolve header cell values
  const ssFile = zip.file('xl/sharedStrings.xml');
  const sharedStrings = ssFile ? parseSharedStrings(await ssFile.async('string')) : [];

  async function patchSheet(sheetPath, tablePath, dataRows, numCols, lastColLetter) {
    const sXml = await zip.file(sheetPath).async('string');
    zip.file(sheetPath, patchSheetXml(sXml, dataRows, numCols));
    const rawHeaders = extractHeaderNames(sXml, sharedStrings);
    // Always produce exactly numCols entries so tableColumns count matches the ref
    const headers = Array.from({ length: numCols }, (_, i) => rawHeaders[i] || `Column${i + 1}`);
    const tXml = await zip.file(tablePath).async('string');
    const newRef = `A1:${lastColLetter}${dataRows.length + 1}`;
    zip.file(tablePath, patchTableXml(tXml, newRef, headers));
  }

  await patchSheet('xl/worksheets/sheet1.xml', 'xl/tables/table1.xml', mainOut,     5,  'E');
  await patchSheet('xl/worksheets/sheet2.xml', 'xl/tables/table2.xml', measuresOut, 18, 'R');
  await patchSheet('xl/worksheets/sheet3.xml', 'xl/tables/table3.xml', elecOut,     8,  'H');
  await patchSheet('xl/worksheets/sheet4.xml', 'xl/tables/table4.xml', gasOut,      8,  'H');

  const wbBytes = await zip.generateAsync({ type: 'uint8array', compression: 'DEFLATE' });
  const blob = new Blob([wbBytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

  const dateStr = new Date().toISOString().slice(0, 10);
  const idStr   = jobIds.length === 1 ? jobIds[0] : `${jobIds.length}jobs`;
  const filename = `export_${idStr}_${dateStr}.xlsx`;

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);

  const note = errors.length ? ` · ${errors.length} error(s)` : '';
  setBadge('ok', `Exported ${filename}${note}`);
}
// ---------- END XLSX EXPORT ----------
